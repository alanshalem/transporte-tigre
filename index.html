    <!-- Open Graph -->

      content="Mapa interactivo de las lanchas colectivas del Delta del Tigre. Líneas 450 a 455, horarios, recorridos y posición en tiempo real."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Kill any stale Service Workers / Caches from other localhost projects -->
    <script>
      (function () {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) {
                r.unregister();
              });
            });
          }
          if (globalThis.caches && caches.keys) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) {
                caches.delete(k);
              });
            });
          }
        } catch {
          /* SW/cache APIs unavailable; safe to skip */
        }
      })();
    </script>

    <!-- Theme init (no FOUC) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('tigre-theme');
          var prefersDark = globalThis.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch {
          /* localStorage unavailable; default light */
        }
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"

    />

  </body>
